<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark bg pill for context (optional, remove if placing on dark bg) -->
  <rect width="280" height="80" rx="12" fill="#0f0d09"/>

  <!-- Outer circle -->
  <circle cx="40" cy="40" r="36" stroke="#2a2215" stroke-width="1"/>
  <!-- Glow -->
  <ellipse cx="40" cy="33" rx="18" ry="14" fill="#e85d26" opacity="0.07"/>

  <!-- Rays -->
  <line x1="40" y1="11" x2="40" y2="3"  stroke="#e85d26" stroke-width="2" stroke-linecap="round"/>
  <line x1="59" y1="17" x2="65" y2="11" stroke="#e85d26" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <line x1="21" y1="17" x2="15" y2="11" stroke="#e85d26" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <line x1="68" y1="36" x2="76" y2="33" stroke="#e85d26" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="12" y1="36" x2="4"  y2="33" stroke="#e85d26" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Lighthouse -->
  <rect x="25" y="59" width="30" height="5"  rx="1.5" fill="#f0ead8"/>
  <rect x="30" y="38" width="20" height="22" rx="1.5" fill="#f0ead8"/>
  <rect x="27" y="26" width="26" height="14" rx="2.5" fill="#f0ead8"/>
  <rect x="26" y="23" width="28" height="4"  rx="1.5" fill="#f0ead8"/>
  <!-- Lens -->
  <rect x="31" y="29" width="18" height="8" rx="1.5" fill="#e85d26" opacity="0.95"/>
  <!-- Window -->
  <rect x="36" y="44" width="8" height="10" rx="1.5" fill="#e85d26" opacity="0.2"/>

  <!-- Wordmark -->
  <text
    x="92"
    y="55"
    font-family="Syne, 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="46"
    letter-spacing="-1.5"
    fill="#f0ead8"
  >faro<tspan fill="#e85d26">.</tspan></text>
</svg>
